services:

  frontend:
    image: adeeltech/multi-tier-frontend:latest
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    image: adeeltech/multi-tier-backend:latest
    expose:
      - "8080"
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: multi_tier_db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend