name: Deploy Full Stack App

on:
  push:
    branches:
      - main
      - master

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  FRONTEND_BUILD_FOLDER: build

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- FRONTEND DEPLOY ---
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/${{ env.FRONTEND_BUILD_FOLDER }} s3://${{ vars.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # --- BACKEND DEPLOY TO ECR ---
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest ./backend
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      # --- DEPLOY BACKEND ON EC2 ---
      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to ECR on the EC2 server (Important!)
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            # 2. Stop & remove previous container
            docker stop backend || true
            docker rm -f backend || true

            # 3. Pull latest image
            docker pull ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

            # 4. Run new container
            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

            # 5. Clean up old unused images to save space
            docker image prune -f