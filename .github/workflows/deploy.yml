name: Deploy Full Stack App

on:
  push:
    branches:
      - main
      - master

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  FRONTEND_BUILD_FOLDER: build  # or 'dist' if your React app outputs to dist/

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # Checkout repo
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------
      # Configure AWS credentials
      # -----------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------
      # FRONTEND DEPLOY (React)
      # -----------------------
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/${{ env.FRONTEND_BUILD_FOLDER }} s3://${{ vars.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # -----------------------
      # BACKEND DEPLOY TO ECR
      # -----------------------
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:latest ./backend

      - name: Tag image for ECR
        run: |
          docker tag $ECR_REPOSITORY:latest ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:latest

      - name: Push image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:latest

      # -----------------------
      # DEPLOY BACKEND ON EC2
      # -----------------------
      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: |
            ECR_REPOSITORY=${{ env.ECR_REPOSITORY }}
            ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}
          script: |
            # Stop & remove previous container if exists
            docker stop backend || true
            docker rm backend || true

            # Pull latest image from ECR
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

            # Run container
            docker run -d \
              --name backend \
              -p 8080:8080 \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest